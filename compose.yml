services:
  # Backend server
  sakay-server:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: sakay-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://localhost:27017/
      - DB_NAME=SakayDB
      - JWT_SECRET=${JWT_SECRET:-f47ac10b58e74ac1b6c7001438914b53ef69b6f17e2985f9e83163459c235a91}
    networks:
      - sakay-network

  # React application - self-hosted nginx serving production build
  sakay-client:
    build:
      context: ./Client
      dockerfile: Dockerfile
    container_name: sakay-client
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - sakay-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Nginx reverse proxy
  nginx-proxy:
    image: nginx:stable-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      sakay-client:
        condition: service_healthy
      sakay-server:
        condition: service_started
    networks:
      - sakay-network

  # Certbot renewal service
  certbot:
    image: certbot/certbot
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    networks:
      - sakay-network

networks:
  sakay-network:
    driver: bridge
