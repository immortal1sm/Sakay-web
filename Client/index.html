<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00B14F" />
    <title>SakayNE - Modern Commuting Solution</title>
    
    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        const saved = localStorage.getItem('sakay-theme');
        const theme = saved !== null ? saved : 'system';
        let effective = theme;
        if (theme === 'system') {
          effective = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.classList.add(effective);
      })();
    </script>

    <!-- Suppress extension console errors -->
    <script>
      // Filter out extension errors from console
      (function() {
        const originalError = window.console.error;
        window.console.error = function(...args) {
          const msg = args[0]?.toString() || '';
          // Ignore common extension errors
          if (msg.includes('ethereum') || 
              msg.includes('chrome-extension://invalid') ||
              msg.includes('Cannot assign to read only property')) {
            return;
          }
          originalError.apply(window.console, args);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
